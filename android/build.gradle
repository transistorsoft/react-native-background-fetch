apply plugin: 'com.android.library'

def DEFAULT_COMPILE_SDK_VERSION     = 36
def DEFAULT_TARGET_SDK_VERSION      = 36
def DEFAULT_MIN_SDK_VERSION 	    = 16

def safeExtGet(prop, fallback) {
    rootProject.ext.has(prop) ? rootProject.ext.get(prop) : fallback
}

android {
    if (project.android.hasProperty("namespace")) {
        namespace("com.transistorsoft.rnbackgroundfetch")
    }

    compileSdkVersion safeExtGet('compileSdkVersion', DEFAULT_COMPILE_SDK_VERSION)

    defaultConfig {
        minSdkVersion safeExtGet('minSdkVersion', DEFAULT_MIN_SDK_VERSION)
        targetSdkVersion safeExtGet('targetSdkVersion', DEFAULT_TARGET_SDK_VERSION)
        consumerProguardFiles 'proguard-rules.pro'
        versionCode 1
        versionName "1.0"
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

repositories{
    mavenCentral()
    maven {
        url './libs'
    }
}

dependencies {
    
    implementation "com.facebook.react:react-native:${safeExtGet('reactNativeVersion', '+')}"

    def backgroundFetchVersion = safeExtGet('backgroundFetchVersion', '4.0.+')
    implementation "com.transistorsoft:tsbackgroundfetch:$backgroundFetchVersion"
}
